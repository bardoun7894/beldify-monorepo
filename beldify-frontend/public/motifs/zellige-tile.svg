<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!--
    Khatim Sulaymani — eight-point star, Tetouani zellige motif.
    Colour: #0E5C9B (Atlas Blue), fill at 100% opacity.
    The wrapper div in page.tsx applies opacity: 0.10.
    No external fonts, images, or scripts.
  -->
  <!-- Eight-point star: outer octagon + inner rotated octagon, forming the khatim -->
  <!-- Star polygon: 8 points alternating at outer radius 48 and inner radius 20 -->
  <polygon
    points="
      60,12
      69.2,40.6
      95.5,24.5
      79.4,50.8
      108,60
      79.4,69.2
      95.5,95.5
      69.2,79.4
      60,108
      50.8,79.4
      24.5,95.5
      40.6,69.2
      12,60
      40.6,50.8
      24.5,24.5
      50.8,40.6
    "
    fill="#0E5C9B"
  />
  <!-- Central octet connecting lines — Andalusian zellige style interlace outline -->
  <polygon
    points="
      60,28
      67.1,46.5
      82,36
      74.5,52.9
      93,60
      74.5,67.1
      82,84
      67.1,73.5
      60,92
      52.9,73.5
      38,84
      45.5,67.1
      27,60
      45.5,52.9
      38,36
      52.9,46.5
    "
    fill="none"
    stroke="#0E5C9B"
    stroke-width="1.5"
  />
  <!-- Corner diamond accents — four-petal rose filling tile corners -->
  <rect x="0" y="52" width="8" height="16" rx="4" fill="#0E5C9B" transform="rotate(45 4 60)" />
  <rect x="112" y="52" width="8" height="16" rx="4" fill="#0E5C9B" transform="rotate(45 116 60)" />
  <rect x="52" y="0" width="16" height="8" rx="4" fill="#0E5C9B" transform="rotate(45 60 4)" />
  <rect x="52" y="112" width="16" height="8" rx="4" fill="#0E5C9B" transform="rotate(45 60 116)" />
</svg>
