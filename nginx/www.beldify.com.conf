# Nginx configuration for www.beldify.com (Frontend)
# Copy this file to /etc/nginx/sites-available/ on your VPS

server {
    listen 80;
    server_name www.beldify.com beldify.com;

    # Redirect HTTP to HTTPS (after SSL is configured)
    # Uncomment after running certbot:
    # return 301 https://$server_name$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Next.js static files
    location /_next/static {
        proxy_pass http://127.0.0.1:3100;
        proxy_cache_valid 60m;
        add_header Cache-Control "public, immutable";
    }
}
