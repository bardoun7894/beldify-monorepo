# Nginx configuration for pro.beldify.com (Backend API)
# Copy this file to /etc/nginx/sites-available/ on your VPS

server {
    listen 80;
    server_name pro.beldify.com;

    # Redirect HTTP to HTTPS (after SSL is configured)
    # Uncomment after running certbot:
    # return 301 https://$server_name$request_uri;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:7894;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    # Laravel Reverb WebSocket
    location /app {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Storage/uploads
    location /storage {
        proxy_pass http://127.0.0.1:7894/storage;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_valid 200 1d;
    }
}
